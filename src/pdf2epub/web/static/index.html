<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>pdf2epub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f6f5f0;
    --paper-raised: #efeee7;
    --ink: #1e201c;
    --ink-soft: #55564e;
    --ink-faint: #8b8c82;
    --rule: #d8d6cc;
    --stamp: #a8342a;
    --stamp-soft: #f3e2df;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #1a1b1e;
      --paper-raised: #232429;
      --ink: #e7e4d8;
      --ink-soft: #b3b0a2;
      --ink-faint: #706e64;
      --rule: #35363a;
      --stamp: #d0564a;
      --stamp-soft: #3a2422;
    }
  }
  :root[data-theme="dark"] {
    --paper: #1a1b1e;
    --paper-raised: #232429;
    --ink: #e7e4d8;
    --ink-soft: #b3b0a2;
    --ink-faint: #706e64;
    --rule: #35363a;
    --stamp: #d0564a;
    --stamp-soft: #3a2422;
  }
  :root[data-theme="light"] {
    --paper: #f6f5f0;
    --paper-raised: #efeee7;
    --ink: #1e201c;
    --ink-soft: #55564e;
    --ink-faint: #8b8c82;
    --rule: #d8d6cc;
    --stamp: #a8342a;
    --stamp-soft: #f3e2df;
  }

  * { box-sizing: border-box; }
  body {
    font-family: "IBM Plex Sans", -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    max-width: 640px;
    margin: 4rem auto;
    padding: 0 1.25rem 4rem;
    line-height: 1.5;
  }

  .stamp {
    display: inline-block;
    font-family: "IBM Plex Mono", ui-monospace, monospace;
    font-weight: 600;
    font-size: 0.95rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--stamp);
    border: 2px solid var(--stamp);
    border-radius: 3px;
    padding: 0.3rem 0.7rem;
    transform: rotate(-1.5deg);
  }
  h1 { margin: 0 0 0.6rem; }
  .tagline { color: var(--ink-soft); margin: 0 0 1.75rem; font-size: 0.95rem; }
  .rule { border: none; border-top: 1px solid var(--rule); margin: 1.75rem 0; }

  #drop {
    border: 1.5px dashed var(--ink-faint);
    border-radius: 4px;
    padding: 3rem 1rem;
    text-align: center;
    color: var(--ink-soft);
    cursor: pointer;
    font-size: 0.95rem;
    transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
  }
  #drop.hover { border-color: var(--stamp); color: var(--ink); background: var(--stamp-soft); }
  #drop.disabled { opacity: 0.45; cursor: not-allowed; }

  .row { margin: 1.1rem 0; }
  label {
    display: block;
    font-family: "IBM Plex Mono", ui-monospace, monospace;
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 0.35rem;
  }
  input[type=text], input[type=number] {
    width: 100%;
    font-family: inherit;
    font-size: 0.9rem;
    color: var(--ink);
    background: var(--paper-raised);
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 0.5rem 0.6rem;
  }
  input:focus-visible, button:focus-visible, #drop:focus-visible {
    outline: 2px solid var(--stamp);
    outline-offset: 2px;
  }

  progress { width: 100%; accent-color: var(--stamp); height: 6px; }
  #status {
    font-size: 0.85rem;
    color: var(--ink-soft);
    margin-top: 0.6rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
  }
  a.download {
    display: inline-block;
    margin-top: 1rem;
    font-family: "IBM Plex Mono", ui-monospace, monospace;
    font-size: 0.85rem;
    letter-spacing: 0.03em;
    padding: 0.65rem 1.3rem;
    background: var(--stamp);
    color: #fdfaf5;
    text-decoration: none;
    border-radius: 3px;
  }
  a.download:hover { opacity: 0.9; }

  #error { color: var(--stamp); margin-top: 0.75rem; font-size: 0.9rem; }
  #error summary { cursor: pointer; font-size: 0.8rem; color: var(--ink-soft); margin-top: 0.4rem; }
  #error pre {
    white-space: pre-wrap;
    background: var(--paper-raised);
    border: 1px solid var(--rule);
    padding: 0.6rem;
    border-radius: 3px;
    font-size: 0.72rem;
    max-height: 200px;
    overflow-y: auto;
    font-family: "IBM Plex Mono", ui-monospace, monospace;
  }

  button.cancel {
    font-family: "IBM Plex Mono", ui-monospace, monospace;
    font-size: 0.72rem;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    padding: 0.3rem 0.65rem;
    border: 1px solid var(--stamp);
    color: var(--stamp);
    background: transparent;
    border-radius: 3px;
    cursor: pointer;
  }
  button.cancel:hover { background: var(--stamp-soft); }
  button.cancel:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Deliberately terminal-styled, not themed to match the page: this is a
     live technical readout, and looking like one is the point. */
  #log {
    display: none;
    margin-top: 0.85rem;
    height: 150px;
    overflow-y: auto;
    background: #17181a;
    color: #d6d3c4;
    font-family: "IBM Plex Mono", ui-monospace, monospace;
    font-size: 0.76rem;
    line-height: 1.55;
    padding: 0.6rem 0.75rem;
    border-radius: 4px;
  }
  #log div { white-space: pre-wrap; }
  #log .t { color: #6f7168; margin-right: 0.5rem; }
</style>
</head>
<body>
  <span class="stamp">pdf2epub</span>
  <p class="tagline">Convierte PDFs grandes e ilustrados a EPUB. Arrastra un archivo para empezar.</p>

  <div id="drop" tabindex="0" role="button" aria-label="Subir PDF">Suelta el PDF aquí, o haz clic para elegir archivo</div>
  <input type="file" id="fileInput" accept="application/pdf" style="display:none" />

  <hr class="rule" />

  <div class="row">
    <label for="lang">Idiomas OCR</label>
    <input type="text" id="lang" value="spa+eng+por" />
  </div>
  <div class="row">
    <label for="maxImageSize">Lado máximo de imagen (px)</label>
    <input type="number" id="maxImageSize" value="1600" />
  </div>
  <div class="row">
    <label for="jpegQuality">Calidad JPEG</label>
    <input type="number" id="jpegQuality" value="85" min="1" max="100" />
  </div>

  <div class="row" id="progressRow" style="display:none">
    <progress id="progress" max="1" value="0"></progress>
    <div id="status">
      <span id="statusText"></span>
      <button class="cancel" id="cancelBtn">Cancelar</button>
    </div>
    <div id="log"></div>
  </div>

  <div id="error"></div>
  <div id="result"></div>

<script>
const drop = document.getElementById('drop');
const fileInput = document.getElementById('fileInput');
const progressRow = document.getElementById('progressRow');
const progressEl = document.getElementById('progress');
const statusEl = document.getElementById('statusText');
const cancelBtn = document.getElementById('cancelBtn');
const errorEl = document.getElementById('error');
const resultEl = document.getElementById('result');
const logEl = document.getElementById('log');

const JOB_KEY = 'pdf2epub_job_id';

const STAGE_LABELS = {
  queued: 'En cola',
  classify: 'Detectando páginas escaneadas',
  ocr: 'OCR (páginas escaneadas)',
  extract: 'Extrayendo contenido',
  extract_parallel: 'Extrayendo contenido (paralelo)',
  build_epub: 'Ensamblando EPUB',
};

const STAGE_INTRO = {
  classify: 'Abriendo el PDF y revisando página por página cuáles tienen texto y cuáles son escaneadas...',
  ocr: 'Se encontraron páginas escaneadas: iniciando OCR con Tesseract. En libros grandes esto puede tardar varios minutos.',
  extract: 'OCR listo (o no hacía falta). Extrayendo texto, imágenes y tablas capítulo por capítulo...',
  extract_parallel: 'Libro mayormente digital: extrayendo capítulos en paralelo en varios procesos para aprovechar los cores del Mac.',
  build_epub: 'Contenido extraído. Ensamblando el archivo EPUB final...',
};

let logState = { stage: null, lastMilestone: 0 };
let currentJobId = null;

function logLine(msg) {
  // msg can contain a user-supplied filename (e.g. from file.name) — build
  // the line with text nodes, never innerHTML, so it can't be interpreted
  // as markup (a PDF named "<img src=x onerror=...>.pdf" must stay inert).
  const t = new Date().toLocaleTimeString('es-CO', { hour12: false });
  const line = document.createElement('div');
  const timeSpan = document.createElement('span');
  timeSpan.className = 't';
  timeSpan.textContent = t;
  line.appendChild(timeSpan);
  line.appendChild(document.createTextNode(msg));
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

function logProgress(stage, current, total) {
  logEl.style.display = 'block';

  if (stage !== logState.stage) {
    logLine(STAGE_INTRO[stage] || `Etapa: ${STAGE_LABELS[stage] || stage}`);
    logState = { stage, lastMilestone: 0 };
  }

  if (stage === 'ocr') {
    // Elapsed seconds, ticking — log every 5s so the panel visibly moves.
    if (current - logState.lastMilestone >= 5) {
      logLine(`OCR en progreso... ${current}s transcurridos`);
      logState.lastMilestone = current;
    }
  } else if (total > 0) {
    const step = Math.max(1, Math.floor(total / 15)); // ~15 log lines per stage
    if (current - logState.lastMilestone >= step || current === total) {
      logLine(`${current}/${total} páginas procesadas`);
      logState.lastMilestone = current;
    }
  }
}

function notify(title, body) {
  if (typeof Notification === 'undefined') return;
  if (Notification.permission === 'granted') {
    new Notification(title, { body });
  }
}

function setFormDisabled(disabled) {
  drop.classList.toggle('disabled', disabled);
  fileInput.disabled = disabled;
}

drop.addEventListener('click', () => { if (!fileInput.disabled) fileInput.click(); });
drop.addEventListener('keydown', e => {
  if ((e.key === 'Enter' || e.key === ' ') && !fileInput.disabled) { e.preventDefault(); fileInput.click(); }
});
drop.addEventListener('dragover', e => { e.preventDefault(); if (!fileInput.disabled) drop.classList.add('hover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('hover'));
drop.addEventListener('drop', e => {
  e.preventDefault();
  drop.classList.remove('hover');
  if (fileInput.disabled) return;
  if (e.dataTransfer.files.length) startJob(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files.length) startJob(fileInput.files[0]);
});
cancelBtn.addEventListener('click', async () => {
  if (!currentJobId) return;
  cancelBtn.disabled = true;
  cancelBtn.textContent = 'Cancelando...';
  await fetch(`/jobs/${currentJobId}/cancel`, { method: 'POST' });
  logLine('Cancelación solicitada...');
});

async function startJob(file) {
  if (typeof Notification !== 'undefined' && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  errorEl.innerHTML = '';
  resultEl.innerHTML = '';
  logEl.innerHTML = '';
  logState = { stage: null, lastMilestone: 0 };
  progressRow.style.display = 'block';
  progressEl.style.display = '';
  progressEl.removeAttribute('value');
  cancelBtn.style.display = '';
  cancelBtn.disabled = false;
  cancelBtn.textContent = 'Cancelar';
  statusEl.textContent = 'Subiendo...';
  logLine(`Subiendo ${file.name} (${(file.size / 1024 / 1024).toFixed(1)} MB)...`);
  setFormDisabled(true);

  const form = new FormData();
  form.append('file', file);
  form.append('lang', document.getElementById('lang').value);
  form.append('max_image_size', document.getElementById('maxImageSize').value);
  form.append('jpeg_quality', document.getElementById('jpegQuality').value);

  const res = await fetch('/jobs', { method: 'POST', body: form });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    errorEl.textContent = body.error || 'Error al subir el archivo.';
    progressRow.style.display = 'none';
    setFormDisabled(false);
    return;
  }
  const { job_id } = await res.json();
  currentJobId = job_id;
  localStorage.setItem(JOB_KEY, job_id);
  poll(job_id);
}

function showErrorDetail(summary, detail) {
  // summary is server-generated from a Python exception message, which can
  // itself embed attacker-influenced text (e.g. a crafted filename) — never
  // interpolate it into innerHTML.
  const details = document.createElement('details');
  const summaryEl = document.createElement('summary');
  summaryEl.textContent = 'Ver detalle técnico';
  const pre = document.createElement('pre');
  pre.textContent = detail || '(sin detalle)';
  details.appendChild(summaryEl);
  details.appendChild(pre);
  errorEl.innerHTML = '';
  const summaryLine = document.createElement('div');
  summaryLine.textContent = `Error: ${summary}`;
  errorEl.appendChild(summaryLine);
  errorEl.appendChild(details);
}

async function poll(jobId) {
  const res = await fetch(`/jobs/${jobId}`);
  if (!res.ok) {
    // Server restarted or job purged — stop trying to reconnect to a dead job.
    localStorage.removeItem(JOB_KEY);
    progressRow.style.display = 'none';
    setFormDisabled(false);
    errorEl.textContent = 'No se encontró el trabajo (¿se reinició el servidor?). Sube el archivo de nuevo.';
    return;
  }
  const job = await res.json();

  if (job.status === 'error') {
    showErrorDetail(job.error_summary || job.error || 'error desconocido', job.error_detail);
    logLine(`ERROR: ${job.error_summary || job.error}`);
    notify('pdf2epub: falló la conversión', job.error_summary || '');
    progressRow.style.display = 'none';
    setFormDisabled(false);
    localStorage.removeItem(JOB_KEY);
    return;
  }

  if (job.status === 'cancelled') {
    logLine('Conversión cancelada.');
    statusEl.textContent = 'Cancelado.';
    progressEl.style.display = 'none';
    cancelBtn.style.display = 'none';
    setFormDisabled(false);
    localStorage.removeItem(JOB_KEY);
    return;
  }

  if (job.total) {
    progressEl.max = job.total;
    progressEl.value = job.current;
  } else {
    progressEl.removeAttribute('value'); // indeterminate: animated native bar
  }

  const label = STAGE_LABELS[job.stage] || job.stage;
  if (job.stage === 'ocr') {
    statusEl.textContent = `${label} — ${job.current}s transcurridos (normal que tarde en libros grandes)`;
  } else {
    statusEl.textContent = `${label} (${job.current}/${job.total || '?'})`;
  }
  logProgress(job.stage, job.current, job.total);

  if (job.status === 'done') {
    logLine('Listo. EPUB generado.');
    notify('pdf2epub: EPUB listo', job.filename || '');
    progressEl.style.display = 'none';
    cancelBtn.style.display = 'none';
    statusEl.textContent = 'Completado.';
    resultEl.innerHTML = `<a class="download" href="/jobs/${jobId}/download">Descargar EPUB</a>`;
    setFormDisabled(false);
    localStorage.removeItem(JOB_KEY);
    return;
  }

  setTimeout(() => poll(jobId), 1000);
}

// On load: if a job was in flight when the page was closed/refreshed, reconnect to it
// instead of showing an empty form (the job keeps running on the server either way).
(function reconnect() {
  const savedId = localStorage.getItem(JOB_KEY);
  if (!savedId) return;
  currentJobId = savedId;
  progressRow.style.display = 'block';
  logLine('Reconectando a la conversión en curso...');
  setFormDisabled(true);
  poll(savedId);
})();
</script>
</body>
</html>
